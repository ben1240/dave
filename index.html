<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pour Grd fr Dave</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            /* Mélange Rose et Rouge (très chaleureux) */
            background: linear-gradient(135deg, #08ff94 0%, #ffb199 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .card {
            background: rgba(255, 255, 255, 0.39);
            backdrop-filter: blur(12px);
            padding: 2.5rem;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-align: center;
            width: 85%;
            max-width: 400px;
        }

        h2 { color: #ffffff; text-shadow: 1px 1px 5px rgba(0,0,0,0.1); }
        p { color: white; }

        input {
            padding: 12px 20px;
            border-radius: 15px;
            border: none;
            width: 80%;
            margin-bottom: 20px;
            text-align: center;
            outline: none;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.9);
        }

        button {
            padding: 12px 30px;
            border-radius: 15px;
            border: none;
            background: #fff;
            color: #3108ff; /* Rappel du rouge */
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:active { transform: scale(0.95); }

        #resultat {
            margin-top: 20px;
            color: rgb(255, 255, 255);
            text-align: left;
            padding: 0 5px;
        }

        .word-pop {
            display: block;
            margin: 15px 0;
            font-size: 1.1rem;
            animation: fadeIn 1.2s ease-out forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .final-touch {
            margin-top: 25px;
            font-size: 0.85rem;
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            padding-top: 15px;
            font-style: italic;
            opacity: 0;
            animation: fadeIn 1.5s ease-out forwards;
            animation-delay: 6.5s; /* Apparaît bien après tout le reste */
        }
    </style>
</head>
<body>

    <div class="card" id="mainCard">
        <h2 id="titre">Petit test... oum</h2>
        <p id="instruction">Yoo bro  peut tu ecrire ton nom ? :</p>
        
        <div id="ui-input">
            <input type="text" id="nomInput" placeholder="Ton nom...">
            <br>
            <button onclick="verifierNom()">confirmer</button>
        </div>

        <div id="resultat"></div>
    </div>

    <script>
        function verifierNom() {
            const nom = document.getElementById('nomInput').value.trim().toLowerCase();
            const zoneResultat = document.getElementById('resultat');
            const titre = document.getElementById('titre');
            const inputArea = document.getElementById('ui-input');
            const instruction = document.getElementById('instruction');
            
            if (nom === "gilbert") {
                inputArea.style.display = "none";
                instruction.style.display = "none";
                titre.innerHTML = "Yooo tchalee ! ✌️";
                
                const qualifs = [
                    "• Un bro assez cool",
                    "• Le seul President de la cité ",
                    "• le seul swager",
                    ". Alors cette ptite page je l'ai fais specialement pour tw tu en dis qw"
                ];
                
                let i = 0;
                // Délai de 2 secondes entre chaque phrase pour une lecture facile
                const interval = setInterval(() => {
                    if (i < qualifs.length) {
                        zoneResultat.innerHTML += `<span class='word-pop'>${qualifs[i]}</span>`;
                        i++;
                    } else {
                        clearInterval(interval);
                        // Message final discret
                        zoneResultat.innerHTML += `<div class='final-touch'>Bon, j'ai pas le talent d'un poète, mais c'est l'intention qui compte non ? 😉</div>`;
                    }
                }, 6000); 
            } 
            else {
                zoneResultat.innerHTML = "<p style='color: #fff;'>Désolé, c'est réservé à grd fr Dave. 🔒</p>";
                setTimeout(() => { zoneResultat.innerHTML = ""; }, 3000);
            }
        }
    </script>
</body>
</html>
